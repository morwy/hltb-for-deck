name: Build and Release HLTB for Deck

on: 
  workflow_dispatch: # Creating releases manually via GUI.
  pull_request_target: # Creating releases via PRs to main branch.
    types: [opened, synchronize, reopened]

jobs:
    build:
      runs-on: ubuntu-latest
      permissions:
          contents: write
          issues: write

      steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          repository: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.ref }}

      - name: Increment npm version
        uses: reecetech/version-increment@2024.10.1
        id: increment-npm-version
        with:
          scheme: semver
          increment: patch

      - name: Write incremented version to package.json
        uses: reedyuk/npm-version@1.2.2
        with:
          version: ${{ steps.increment-npm-version.outputs.version }} 

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: '22.13'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build the plugin
        run: pnpm run build

      - name: Create package structure
        run: |
          cp plugin.json ./dist/
          cp package.json ./dist/
          mkdir ./dist/dist
          rm ./dist/index.js.map
          mv ./dist/index.js ./dist/dist/
          mv ./dist ./hltb-for-deck

      - name: Archive built files
        run: |
          zip -r hltb-for-deck.zip hltb-for-deck/*
          tar -czvf hltb-for-deck.tar.gz hltb-for-deck

      - name: Upload built binaries
        uses: actions/upload-artifact@v7
        with:
          name: hltb-for-deck
          path: |
            hltb-for-deck.zip
            hltb-for-deck.tar.gz
          if-no-files-found: error

      - name: Attach built binaries link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number
            const artifactUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/suites/${process.env.GITHUB_RUN_ID}/artifacts`
            const body = `Built binaries for this PR are available as workflow artifacts:\n\n- **[Download artifacts](${artifactUrl})**\n- hltb-for-deck.zip\n- hltb-for-deck.tar.gz\n\nThis link is valid while the workflow run artifacts are retained.`
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: prNumber,
              body,
            })

      - name: Generate a changelog
        if: github.ref_name == 'main'
        uses: orhun/git-cliff-action@v4
        id: git-cliff-release-entry
        with:
          config: cliff.toml
          args: --verbose --strip all --tag ${{ steps.increment-npm-version.outputs.v-version }} --unreleased
        env:
          OUTPUT: CHANGES.md

      - name: Get changelog since last release
        if: github.ref_name == 'main'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --tag ${{ steps.increment-npm-version.outputs.v-version }}
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit CHANGELOG.md and package.json
        if: github.ref_name == 'main'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          file_pattern: 'CHANGELOG.md package.json'
          branch: ${{ github.ref_name }}
          commit_message: "chore(release): preparing for upcoming release (CHANGELOG.md, package.json)"

      - name: Create a release
        if: github.ref_name == 'main'
        uses: ncipollo/release-action@v1
        with:
          body: "${{ steps.git-cliff-release-entry.outputs.content }}"
          tag: "${{ steps.increment-npm-version.outputs.v-version }}"
          artifacts: "*.zip, *.tar.gz"
